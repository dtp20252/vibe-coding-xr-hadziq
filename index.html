<!doctype html>
<html lang="en">
  <head>
    <title>3D Brain Anatomy Tutorial | XR Blocks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      /**
       * Interactive Brain Anatomy Tutorial Script
       */
      class AnatomyTutorial extends xb.Script {
        init() {
          // 1. Lighting Setup
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.5));
          const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
          dirLight.position.set(1, 2, 1);
          this.add(dirLight);

          // 2. Spatial UI Setup
          this.uiPanel = new xb.SpatialPanel({
            width: 0.8,
            height: 0.25,
            backgroundColor: '#2b2b2baa',
          });
          this.uiPanel.position.set(0, 1.6, -1.0);
          this.add(this.uiPanel);
          
          const grid = this.uiPanel.addGrid();
          this.uiLabel = grid.addRow({ weight: 1 }).addText({
            text: 'Touch the Front of the Brain',
            fontColor: '#ffffff',
            fontSize: 0.08,
          });

          // 3. 3D Model Setup (Wrapped in xb.ModelViewer as per guidelines)
          this.brainModel = new xb.ModelViewer({});
          this.brainModel.position.set(0, 1.2, -1.0); // y is up, z is forward (-1 is in front of user)
          this.add(this.brainModel);

          // Procedural Lobe Geometries
          const lobeGeom = new THREE.SphereGeometry(0.1, 32, 32);

          // Frontal Lobe (+z faces the user in local space)
          this.frontalLobe = new THREE.Mesh(lobeGeom, new THREE.MeshPhongMaterial({ color: 0xffb6c1 })); // Pinkish
          this.frontalLobe.scale.set(1.0, 0.9, 1.2);
          this.frontalLobe.position.set(0, 0, 0.08);
          this.brainModel.add(this.frontalLobe);

          // Parietal Lobe (Top)
          this.parietalLobe = new THREE.Mesh(lobeGeom, new THREE.MeshPhongMaterial({ color: 0x98fb98 })); // Light Green
          this.parietalLobe.scale.set(1.1, 0.7, 1.0);
          this.parietalLobe.position.set(0, 0.1, -0.05);
          this.brainModel.add(this.parietalLobe);

          // Occipital Lobe (Back)
          this.occipitalLobe = new THREE.Mesh(lobeGeom, new THREE.MeshPhongMaterial({ color: 0xdda0dd })); // Purple
          this.occipitalLobe.scale.set(0.9, 0.8, 0.9);
          this.occipitalLobe.position.set(0, -0.04, -0.12);
          this.brainModel.add(this.occipitalLobe);

          // Temporal Lobes (Sides)
          const tempMat = new THREE.MeshPhongMaterial({ color: 0xffe4b5 }); // Yellowish
          
          this.temporalLobeL = new THREE.Mesh(lobeGeom, tempMat);
          this.temporalLobeL.scale.set(0.6, 0.8, 1.1);
          this.temporalLobeL.position.set(-0.11, -0.06, 0);
          this.brainModel.add(this.temporalLobeL);

          this.temporalLobeR = new THREE.Mesh(lobeGeom, tempMat);
          this.temporalLobeR.scale.set(0.6, 0.8, 1.1);
          this.temporalLobeR.position.set(0.11, -0.06, 0);
          this.brainModel.add(this.temporalLobeR);

          // Invisible hitbox to catch broad grabs and touches
          const hitBoxGeom = new THREE.BoxGeometry(0.35, 0.3, 0.35);
          this.hitBox = new THREE.Mesh(hitBoxGeom, new THREE.MeshBasicMaterial({ visible: false }));
          this.brainModel.add(this.hitBox);

          // Interaction State
          this.isGrabbing = false;
          this.grabHand = null;
          this.draggingController = null;
          this.frontalActive = false;
        }

        /**
         * Logic to trigger when the Frontal Lobe is successfully discovered.
         */
        activateFrontalLobe() {
          if (!this.frontalActive) {
            this.frontalLobe.material.color.setHex(0x4285f4); // Google Blue
            this.uiLabel.setText('Frontal Lobe Discovered!');
            this.frontalActive = true;
          }
        }

        // --- Interaction: Desktop Simulator & Controller Raycasts ---
        
        onSelectStart(event) {
          const controller = event.target;
          const intersections = xb.core.input.intersectObjectByController(controller, this.brainModel, true);
          
          if (intersections.length > 0) {
            this.draggingController = controller;
            
            // Check if user clicked exactly on the frontal lobe
            if (intersections[0].object === this.frontalLobe) {
              this.activateFrontalLobe();
            }
          }
        }

        onSelecting(event) {
          // Rotate the brain smoothly while dragging in simulator
          if (this.draggingController === event.target) {
            this.brainModel.rotation.y += 0.05;
            this.brainModel.rotation.x += 0.01;
          }
        }

        onSelectEnd(event) {
          if (this.draggingController === event.target) {
            this.draggingController = null;
          }
        }

        // --- Interaction: WebXR Hand Tracking ---
        
        onObjectTouchStart(event) {
          // When physical hands touch an object, verify if the index finger is near the Frontal Lobe
          const hand = event.hand;
          if (!hand || !hand.joints) return;
          
          const indexTip = hand.joints['index-finger-tip'];
          if (!indexTip) return;

          const indexTipPos = new THREE.Vector3();
          indexTip.getWorldPosition(indexTipPos);

          const frontalWorldPos = new THREE.Vector3();
          this.frontalLobe.getWorldPosition(frontalWorldPos);

          // If finger is within 12cm of the Frontal Lobe's center
          if (indexTipPos.distanceTo(frontalWorldPos) < 0.12) {
            this.activateFrontalLobe();
          }
        }

        onObjectGrabStart(event) {
          if (this.isGrabbing) return;
          
          this.isGrabbing = true;
          this.grabHand = event.hand;
          this.previousHandRotation = this.grabHand.quaternion.clone();

          // Actively test for touching the lobe during grab to ensure responsiveness
          this.onObjectTouchStart(event);
        }

        onObjectGrabbing(event) {
          if (!this.isGrabbing || !this.grabHand) return;

          // Compute delta rotation between frames
          const currentHandRot = this.grabHand.quaternion.clone();
          const prevHandRotInv = this.previousHandRotation.clone().invert();
          const deltaRot = currentHandRot.multiply(prevHandRotInv);

          // Apply rotation offset to the entire brain group
          this.brainModel.quaternion.premultiply(deltaRot);
          this.previousHandRotation = this.grabHand.quaternion.clone();
        }

        onObjectGrabEnd(event) {
          if (event.hand === this.grabHand) {
            this.isGrabbing = false;
            this.grabHand = null;
          }
        }
      }

      // --- Engine Initialization ---
      document.addEventListener('DOMContentLoaded', function () {
        const options = new xb.Options();
        
        // Enable essential UI and XR features
        options.enableUI();
        options.enableHands();
        
        // Hand tracking visuals configuration
        options.hands.enabled = true;
        options.hands.visualization = true;
        options.hands.visualizeMeshes = true;
        
        // Simulator configuration
        options.simulator.defaultMode = xb.SimulatorMode.POSE;
        options.setAppTitle('3D Brain Anatomy');

        xb.add(new AnatomyTutorial());
        xb.init(options);
      });
    </script>
  </body>
</html>
